<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Presentación - Mexare</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* FONDO */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:url("3-.JPG") center/cover no-repeat;
position:relative;
}

/* capa oscura encima del fondo */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter: blur(3px);
}

/* CONTENEDOR */
.contenedor{
position:relative;
z-index:1;

width:90%;
max-width:900px;

padding:50px 30px;
text-align:center;

background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.2);
border-radius:25px;

backdrop-filter: blur(12px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);

animation: aparecer 1s ease-out;
}

/* ANIMACIÓN */
@keyframes aparecer{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TITULOS */
h1{
font-size:70px;
color:#ff2e88;
letter-spacing:3px;
text-shadow:0 0 20px rgba(255,46,136,0.6);
}

h2{
font-size:32px;
color:#ffd166;
margin-top:10px;
}

h3{
font-size:28px;
color:#ffffff;
margin-top:25px;
}

h4{
font-size:24px;
color:#4cc9f0;
margin-top:10px;
}

h5{
font-size:24px;
color:#80ed99;
margin-top:10px;
}

/* INFO EXTRA */
.info{
margin-top:25px;
font-size:18px;
color:#e0e0e0;
line-height:1.6;
opacity:0.9;
}

/* EFECTO HOVER GENERAL */
.contenedor:hover{
transform:scale(1.01);
transition:0.3s;
}

/* RESPONSIVE */
@media (max-width:600px){
h1{font-size:45px;}
h2{font-size:22px;}
h3,h4,h5{font-size:18px;}
}

</style>
</head>

<body>

<div class="contenedor">

<h1>MEXARE</h1>
<h2>Feria Turística 2026</h2>

<h3>Conalep Ricardo Flores Magón 252</h3>

<h5>Carrera Técnico Bachiller en Informática</h5>

<h4>Carrera Técnico Bachiller en Turismo</h4>



</div>

</body>
</html>
