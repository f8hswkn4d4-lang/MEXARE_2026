<html>
<head>
<title>Fotos</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* FONDO CON IMAGEN */
body{
min-height:100vh;
position:relative;
color:white;
padding:20px;
}

/* IMAGEN DE FONDO */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("5.png") center/cover no-repeat;
filter:blur(6px) brightness(0.5);
transform:scale(1.1);
z-index:-2;
}

/* CAPA OSCURA */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* CONTENEDOR */
.contenedor{
max-width:1100px;
margin:auto;
padding:20px;
}

/* TITULO */
.titulo{
text-align:center;
font-size:40px;
font-weight:bold;
letter-spacing:5px;
margin:20px 0;
color:#fff;
text-shadow:0 3px 10px rgba(0,0,0,0.8);
}

/* LINEA */
hr{
border:none;
height:3px;
background:white;
margin:15px 0;
opacity:0.4;
}

/* GALERIA */
.galeria{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
gap:15px;
}

/* IMAGENES */
.galeria img{
width:100%;
height:140px;
object-fit:cover;
border-radius:15px;
border:3px solid rgba(255,255,255,0.2);
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* HOVER */
.galeria img:hover{
transform:scale(1.08);
border-color:white;
}

</style>

</head>

<body>

<div class="contenedor">

<div class="titulo">FOTOS DEL EVENTO</div>

<hr>

<div class="galeria">

<img src="9.JPEG">
<img src="imagen2.jpg">
<img src="imagen3.jpg">
<img src="imagen4.jpg">
<img src="imagen5.jpg">
<img src="imagen6.jpg">
<img src="imagen7.jpg">
<img src="imagen8.jpg">
<img src="imagen9.jpg">
<img src="imagen10.jpg">

</div>

</div>

</body>
</html>
