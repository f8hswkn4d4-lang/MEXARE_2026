<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BARRA SUPERIOR */
header{
background:#111;
padding:15px;
color:white;
}

/* MENÚ */
nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

/* LINKS */
.menu{
display:flex;
gap:15px;
}

.menu a{
color:white;
text-decoration:none;
padding:8px 12px;
border-radius:5px;
}

.menu a:hover{
background:white;
color:black;
}

/* BOTÓN HAMBURGUESA (solo móvil) */
.menu-toggle{
display:none;
font-size:25px;
cursor:pointer;
}

/* 📱 MÓVIL */
@media (max-width: 768px){

.menu{
display:none;
width:100%;
flex-direction:column;
margin-top:10px;
}

.menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

}

</style>
</head>

<body>

<header>

<nav>
<div><b>Mi Página</b></div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Inicio</a>
<a href="#">Fotos</a>
<a href="#">Videos</a>
<a href="#">Contacto</a>
</div>

</nav>

</header>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
