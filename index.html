<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MEXARE-2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

header{
background:#111;
padding:15px;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.menu{
display:flex;
gap:15px;
}

.menu a{
color:white;
text-decoration:none;
padding:8px 12px;
border-radius:5px;
}

.menu a:hover{
background:white;
color:black;
}

/* botón móvil */
.toggle{
display:none;
font-size:25px;
cursor:pointer;
}

/* 📱 celular */
@media (max-width:768px){

.toggle{
display:block;
}

.menu{
display:none;
width:100%;
flex-direction:column;
margin-top:10px;
}

.menu.active{
display:flex;
}

}

</style>
</head>

<body>

<header>

<nav>

<div><b>Mi página</b></div>

<div class="toggle" onclick="document.querySelector('.menu').classList.toggle('active')">
☰
</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Fotos</a>
<a href="#">Videos</a>
<a href="#">Contacto</a>
</div>

</nav>

</header>

</body>
</html>
</body>
</html>
